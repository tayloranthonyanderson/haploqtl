<svg width="100%" viewBox="0 0 680 286" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
<title>haploqtl</title>
<desc>Genomic banner showing the EB-9 introgression shared by resistant tomato lines and absent from susceptible controls, with candidate-gene and diagnostic-marker tracks.</desc>
